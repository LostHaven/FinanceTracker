name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install python-for-android
    
    - name: Build APK
      run: |
        p4a create --org com.financetracker --name FinanceTracker --version 1.0 --requirements kivy python3 --direction=portrait --source-dir . debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: FinanceTracker
        path: bin/*.apk
