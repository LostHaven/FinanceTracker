name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer
        pip install cython==0.29.33
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache Android SDK
      uses: actions/cache@v3
      with:
        path: ~/android-sdk
        key: android-sdk-${{ runner.os }}
    
    - name: Install Android SDK
      run: |
        mkdir -p ~/android-sdk/cmdline-tools
        cd ~/android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip
        mv cmdline-tools latest
        rm cmdline-tools.zip
        yes | ~/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        ~/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-31" "build-tools;30.0.3" > /dev/null 2>&1
    
    - name: Build APK
      env:
        ANDROID_HOME: ~/android-sdk
        ANDROID_SDK_ROOT: ~/android-sdk
      run: |
        buildozer android debug --verbose 2>&1 || true
    
    - name: Show build output
      run: |
        ls -la bin/ 2>/dev/null || echo "No bin folder"
        cat .buildozer/*.log 2>/dev/null || echo "No logs"
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: FinanceTracker
        path: bin/*.apk
