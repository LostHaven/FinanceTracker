<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinanceTracker Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FinanceTracker">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300ffcc'/%3E%3Cstop offset='100%25' stop-color='%2300b8ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='192' height='192' rx='40' fill='url(%23g)'/%3E%3Ctext x='96' y='130' font-size='100' text-anchor='middle' fill='%231a1a2e' font-family='Arial Black'%3E$%3C/text%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300ffcc'/%3E%3Cstop offset='100%25' stop-color='%2300b8ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='192' height='192' rx='40' fill='url(%23g)'/%3E%3Ctext x='96' y='130' font-size='100' text-anchor='middle' fill='%231a1a2e' font-family='Arial Black'%3E$%3C/text%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding-bottom: 80px;
            color: white;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 119, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 248, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(0, 255, 195, 0.08) 0%, transparent 40%);
            animation: bgPulse 15s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
        
        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header h1 {
            font-size: 22px;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #00ffcc, #00b8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .balance-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            backdrop-filter: blur(20px);
            margin: 15px;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .balance-card .label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .balance-card .amount {
            font-size: 42px;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(0, 255, 204, 0.5);
        }
        
        .balance-card .amount.positive { 
            background: linear-gradient(90deg, #00ffcc, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .balance-card .amount.negative { 
            background: linear-gradient(90deg, #ff6b6b, #ff8e53);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stats-row {
            display: flex;
            gap: 10px;
            padding: 0 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            flex: 1;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .stat-card.income { 
            background: linear-gradient(135deg, rgba(39, 174, 96, 0.3) 0%, rgba(39, 174, 96, 0.1) 100%);
        }
        .stat-card.expense { 
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.3) 0%, rgba(231, 76, 60, 0.1) 100%);
        }
        
        .stat-card .label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }
        
        .stat-card .amount {
            font-size: 18px;
            font-weight: bold;
        }
        
        .stat-card.income .amount { color: #2ecc71; }
        .stat-card.expense .amount { color: #e74c3c; }
        
        .menu {
            padding: 0 15px;
        }
        
        .menu button {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            cursor: pointer;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .menu button:active { 
            transform: scale(0.98); 
        }
        
        .menu button.add { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .menu button.history { 
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .menu button.stats { 
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .menu button.clear {
            background: linear-gradient(135deg, #ff6a88 0%, #ff99ac 100%);
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 5px;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .bottom-nav button {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 15px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        
        .bottom-nav button.active { 
            color: #00ffcc;
            background: rgba(0, 255, 204, 0.1);
        }
        
        .bottom-nav button span {
            font-size: 22px;
        }
        
        .screen { display: none; }
        .screen.active { display: block; }
        
        .form-group {
            padding: 20px;
        }
        
        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }

        .form-group select option {
            background: #1a1a2e;
            color: white;
        }
        
        .form-group button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #00ffcc 0%, #00b8ff 100%);
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 255, 204, 0.3);
        }

        .form-group button:active {
            transform: scale(0.98);
        }
        
        .type-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
        }
        
        .type-toggle button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: none;
            cursor: pointer;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
        }
        
        .type-toggle button.active {
            background: linear-gradient(135deg, #00ffcc 0%, #00b8ff 100%);
            color: #1a1a2e;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.3);
        }
        
        .transactions-list {
            padding: 15px;
        }
        
        .transaction-item {
            background: rgba(255, 255, 255, 0.08);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .transaction-item:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(5px);
        }
        
        .transaction-item .info {
            flex: 1;
        }
        
        .transaction-item .category {
            font-weight: bold;
            color: white;
            margin-bottom: 4px;
        }
        
        .transaction-item .date {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        .transaction-item .description {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
        }
        
        .transaction-item .amount {
            font-size: 18px;
            font-weight: bold;
            margin-left: 15px;
        }
        
        .transaction-item .amount.income { color: #2ecc71; }
        .transaction-item .amount.expense { color: #e74c3c; }

        .transaction-item .delete-btn {
            background: rgba(231, 76, 60, 0.3);
            border: none;
            color: #e74c3c;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            margin-left: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .transaction-item .delete-btn:hover {
            background: #e74c3c;
            color: white;
            transform: scale(1.1);
        }
        
        .stats-screen { padding: 15px; }
        
        .stats-section {
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .stats-section h3 {
            color: white;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .stats-section .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .stats-section .stat-row:last-child {
            border-bottom: none;
        }

        .stats-section .stat-row .value {
            font-weight: bold;
            color: #00ffcc;
        }
        
        .empty-state {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            padding: 40px;
            font-size: 16px;
        }

        .delete-all-btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            margin: 15px;
            width: calc(100% - 30px);
            transition: all 0.3s ease;
        }

        .delete-all-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(255, 107, 107, 0.4);
        }

        .confirm-dialog {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .confirm-dialog.show {
            display: flex;
        }

        .confirm-dialog .content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 300px;
        }

        .confirm-dialog h3 {
            margin-bottom: 15px;
            color: white;
        }

        .confirm-dialog p {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
        }

        .confirm-dialog .buttons {
            display: flex;
            gap: 10px;
        }

        .confirm-dialog button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .confirm-dialog .cancel-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .confirm-dialog .confirm-btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: white;
        }

        .currency-select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            min-width: 150px;
        }

        .currency-select option {
            background: #1a1a2e;
            color: white;
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation"></div>
    <div class="particles" id="particles"></div>

    <div class="header">
        <h1>💰 FinanceTracker</h1>
        <div class="subtitle">Управление личными финансами</div>
    </div>
    
    <!-- Home Screen -->
    <div id="home-screen" class="screen active">
        <div class="balance-card">
            <div class="label">Общий баланс</div>
            <div class="amount positive" id="balance-amount">0 ₽</div>
        </div>
        
        <div class="stats-row">
            <div class="stat-card income">
                <div class="label">Доходы</div>
                <div class="amount" id="total-income">+0 ₽</div>
            </div>
            <div class="stat-card expense">
                <div class="label">Расходы</div>
                <div class="amount" id="total-expense">-0 ₽</div>
            </div>
        </div>
        
        <div class="menu">
            <button class="add" onclick="showScreen('add')">➕ Добавить транзакцию</button>
            <button class="history" onclick="showScreen('history')">📋 История транзакций</button>
            <button class="stats" onclick="showScreen('stats')">📊 Статистика</button>
        </div>
    </div>
    
    <!-- Add Transaction Screen -->
    <div id="add-screen" class="screen">
        <div class="form-group">
            <label>Тип транзакции</label>
            <div class="type-toggle">
                <button class="expense active" id="btn-expense" onclick="setType('expense')">💸 Расход</button>
                <button class="income" id="btn-income" onclick="setType('income')">💰 Доход</button>
            </div>
            
            <label>Сумма</label>
            <input type="number" id="amount-input" placeholder="Введите сумму" inputmode="decimal">
            
            <label>Категория</label>
            <select id="category-select"></select>
            
            <label>Описание</label>
            <input type="text" id="description-input" placeholder="Куда потратили/откуда получили">
            
            <button onclick="saveTransaction()">Сохранить транзакцию</button>
        </div>
    </div>
    
    <!-- History Screen -->
    <div id="history-screen" class="screen">
        <button class="delete-all-btn" onclick="showDeleteConfirm()">🗑️ Очистить все транзакции</button>
        <div class="transactions-list" id="transactions-list"></div>
    </div>
    
    <!-- Stats Screen -->
    <div id="stats-screen" class="screen">
        <div class="stats-screen">
            <div class="stats-section">
                <h3>📊 Настройки</h3>
                <div class="stat-row">
                    <span>Валюта</span>
                    <select id="currency-select" class="currency-select" onchange="changeCurrency()">
                        <option value="₽">₽ RUB (Рубль)</option>
                        <option value="Br">Br BYN (Бел. рубль)</option>
                        <option value="$">$ USD (Доллар)</option>
                        <option value="€">€ EUR (Евро)</option>
                        <option value="₸">₸ KZT (Тенге)</option>
                        <option value="₴">₴ UAH (Гривна)</option>
                        <option value="¥">¥ CNY (Юань)</option>
                        <option value="₿">₿ BTC (Биткоин)</option>
                    </select>
                </div>
            </div>
            <div class="stats-section">
                <h3>📉 Расходы по категориям</h3>
                <div id="expense-stats"></div>
            </div>
            <div class="stats-section">
                <h3>📈 Доходы по категориям</h3>
                <div id="income-stats"></div>
            </div>
            <div class="stats-section">
                <h3>📅 За всё время</h3>
                <div class="stat-row">
                    <span>Всего доходов</span>
                    <span class="value" id="total-income-all">0 ₽</span>
                </div>
                <div class="stat-row">
                    <span>Всего расходов</span>
                    <span class="value" id="total-expense-all">0 ₽</span>
                </div>
                <div class="stat-row">
                    <span>Транзакций</span>
                    <span class="value" id="total-count">0</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Confirm Dialog -->
    <div class="confirm-dialog" id="confirm-dialog">
        <div class="content">
            <h3>Подтверждение</h3>
            <p id="confirm-message">Вы уверены?</p>
            <div class="buttons">
                <button class="cancel-btn" onclick="hideDeleteConfirm()">Отмена</button>
                <button class="confirm-btn" id="confirm-action">Удалить</button>
            </div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <button onclick="showScreen('home')" id="nav-home" class="active">
            <span>🏠</span>Главная
        </button>
        <button onclick="showScreen('add')" id="nav-add">
            <span>➕</span>Добавить
        </button>
        <button onclick="showScreen('history')" id="nav-history">
            <span>📋</span>История
        </button>
        <button onclick="showScreen('stats')" id="nav-stats">
            <span>📊</span>Статистика
        </button>
    </div>

    <script>
        // Create particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
        let currentType = 'expense';
        let currency = localStorage.getItem('currency') || '₽';
        
        const categories = {
            expense: ['🍔 Еда', '🚗 Транспорт', '🏠 Жильё', '💡 Коммуналка', '🎬 Развлечения', '🛒 Покупки', '🏥 Здоровье', '📚 Обучение', '📱 Связь', '🎁 Другое'],
            income: ['💵 Зарплата', '💼 Фриланс', '📈 Инвестиции', '🎁 Подарок', '💰 Бизнес', '🎓 Стипендия', '💸 Другое']
        };
        
        function init() {
            updateCategorySelect();
            document.getElementById('currency-select').value = currency;
            refreshData();
        }
        
        function changeCurrency() {
            currency = document.getElementById('currency-select').value;
            localStorage.setItem('currency', currency);
            refreshData();
            showToast('Валюта изменена!');
        }
        
        function updateCategorySelect() {
            const select = document.getElementById('category-select');
            select.innerHTML = categories[currentType].map(c => `<option value="${c}">${c}</option>`).join('');
        }
        
        function setType(type) {
            currentType = type;
            document.getElementById('btn-expense').classList.toggle('active', type === 'expense');
            document.getElementById('btn-income').classList.toggle('active', type === 'income');
            updateCategorySelect();
        }
        
        function saveTransaction() {
            const amount = parseFloat(document.getElementById('amount-input').value);
            const category = document.getElementById('category-select').value;
            const description = document.getElementById('description-input').value;
            
            if (!amount || amount <= 0) {
                alert('Введите корректную сумму');
                return;
            }
            
            const transaction = {
                id: Date.now().toString(),
                amount: amount,
                category: category,
                type: currentType,
                description: description,
                date: new Date().toISOString()
            };
            
            transactions.unshift(transaction);
            localStorage.setItem('transactions', JSON.stringify(transactions));
            
            document.getElementById('amount-input').value = '';
            document.getElementById('description-input').value = '';
            
            showToast('Транзакция добавлена! 🎉');
            refreshData();
            showScreen('home');
        }
        
        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            localStorage.setItem('transactions', JSON.stringify(transactions));
            refreshData();
            showToast('Транзакция удалена');
        }

        function deleteAllTransactions() {
            transactions = [];
            localStorage.setItem('transactions', JSON.stringify(transactions));
            refreshData();
            hideDeleteConfirm();
            showToast('Все транзакции удалены');
        }

        function showDeleteConfirm() {
            if (transactions.length === 0) {
                showToast('Нет транзакций для удаления');
                return;
            }
            document.getElementById('confirm-message').textContent = `Удалить все ${transactions.length} транзакций?`;
            document.getElementById('confirm-action').onclick = deleteAllTransactions;
            document.getElementById('confirm-dialog').classList.add('show');
        }

        function hideDeleteConfirm() {
            document.getElementById('confirm-dialog').classList.remove('show');
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: linear-gradient(135deg, #00ffcc 0%, #00b8ff 100%);
                color: #1a1a2e;
                padding: 15px 25px;
                border-radius: 12px;
                font-weight: bold;
                z-index: 10000;
                animation: toastIn 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'toastIn 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }
        
        function refreshData() {
            const income = transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const expense = transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            const balance = income - expense;
            
            const balanceEl = document.getElementById('balance-amount');
            balanceEl.textContent = balance.toLocaleString() + ' ' + currency;
            balanceEl.className = 'amount ' + (balance >= 0 ? 'positive' : 'negative');
            
            document.getElementById('total-income').textContent = '+' + income.toLocaleString() + ' ' + currency;
            document.getElementById('total-expense').textContent = '-' + expense.toLocaleString() + ' ' + currency;
            
            renderTransactions();
            renderStats();
        }
        
        function renderTransactions() {
            const list = document.getElementById('transactions-list');
            
            if (transactions.length === 0) {
                list.innerHTML = '<div class="empty-state">Нет транзакций<br>Добавьте первую!</div>';
                return;
            }
            
            list.innerHTML = transactions.map(t => {
                const date = new Date(t.date);
                const dateStr = date.toLocaleDateString('ru-RU') + ' ' + date.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});
                const icon = t.type === 'income' ? '💰' : '💸';
                return `
                    <div class="transaction-item">
                        <div class="info">
                            <div class="category">${t.category}</div>
                            <div class="date">${dateStr}</div>
                            ${t.description ? `<div class="description">${t.description}</div>` : ''}
                        </div>
                        <div class="amount ${t.type}">${t.type === 'income' ? '+' : '-'}${t.amount.toLocaleString()} ${currency}</div>
                        <button class="delete-btn" onclick="deleteTransaction('${t.id}')">✕</button>
                    </div>
                `;
            }).join('');
        }
        
        function renderStats() {
            const expenseByCategory = {};
            const incomeByCategory = {};
            
            transactions.forEach(t => {
                if (t.type === 'expense') {
                    expenseByCategory[t.category] = (expenseByCategory[t.category] || 0) + t.amount;
                } else {
                    incomeByCategory[t.category] = (incomeByCategory[t.category] || 0) + t.amount;
                }
            });
            
            const expenseText = Object.entries(expenseByCategory)
                .sort((a, b) => b[1] - a[1])
                .map(([cat, amount]) => `<div class="stat-row"><span>${cat}</span><span class="value">${amount.toLocaleString()} ${currency}</span></div>`)
                .join('') || '<div class="empty-state">Нет данных</div>';
            
            const incomeText = Object.entries(incomeByCategory)
                .sort((a, b) => b[1] - a[1])
                .map(([cat, amount]) => `<div class="stat-row"><span>${cat}</span><span class="value">${amount.toLocaleString()} ${currency}</span></div>`)
                .join('') || '<div class="empty-state">Нет данных</div>';
            
            document.getElementById('expense-stats').innerHTML = expenseText;
            document.getElementById('income-stats').innerHTML = incomeText;

            const totalIncome = transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const totalExpense = transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            
            document.getElementById('total-income-all').textContent = totalIncome.toLocaleString() + ' ' + currency;
            document.getElementById('total-expense-all').textContent = totalExpense.toLocaleString() + ' ' + currency;
            document.getElementById('total-count').textContent = transactions.length;
        }
        
        function showScreen(screen) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screen + '-screen').classList.add('active');
            
            document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + screen)?.classList.add('active');
            
            refreshData();
        }
        
        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
        
        init();
    </script>
</body>
</html>
